<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manga Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}?v=dynamic-2">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">Manga Manager</a>
      <nav>
        <a class="{{ 'active' if active == 'discovery' else '' }}" href="/">Discovery</a>
        <a class="{{ 'active' if active == 'library' else '' }}" href="/library">Library</a>
        <a class="{{ 'active' if active == 'new' else '' }}" href="/new-chapters">New</a>
        <a class="{{ 'active' if active == 'matches' else '' }}" href="/matches">Matches</a>
        <a class="{{ 'active' if active == 'info' else '' }}" href="/info">Info</a>
        <a class="{{ 'active' if active == 'activity' else '' }}" href="/activity">Activity</a>
      </nav>
      <button id="jobs-toggle" class="jobs-toggle" type="button" aria-expanded="false" aria-controls="jobs-drawer">
        Jobs
      </button>
      <form method="post" action="/pull-all" data-async-form>
        <button type="submit">Pull all</button>
        {{ csrf_input()|safe }}
      </form>
    </header>
    <aside id="jobs-drawer" class="jobs-drawer" aria-hidden="true">
      <div class="jobs-drawer-header">
        <h2>Jobs</h2>
        <button id="jobs-close" type="button" class="secondary">Close</button>
      </div>
      <div id="jobs-overall" class="jobs-overall"></div>
      <div id="jobs-drawer-content" class="jobs-drawer-content"></div>
    </aside>
    <div id="toast-stack" class="toast-stack" aria-live="polite" aria-atomic="false"></div>
    <main>
      {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', path='/app.js') }}?v=dynamic-2"></script>
  </body>
</html>
