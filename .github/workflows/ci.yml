name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: UV_CACHE_DIR=.uv-cache uv sync --locked --extra dev
      - run: UV_CACHE_DIR=.uv-cache uv run pytest -q
      - run: UV_CACHE_DIR=.uv-cache uv run ruff check .
      - run: UV_CACHE_DIR=.uv-cache uv run python -m compileall -q app tests
      - run: git diff --check
