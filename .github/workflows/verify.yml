name: Verify

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: manga_manager_test
          POSTGRES_USER: manga
          POSTGRES_PASSWORD: manga
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U manga -d manga_manager_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      V2_TEST_DATABASE_URL: postgresql+psycopg://manga:manga@127.0.0.1:5432/manga_manager_test
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: uv sync --frozen --extra dev
      - run: npm ci
        working-directory: frontend
      - run: npm test
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: uv run ruff check .
      - run: uv run pytest -q

  arm64-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          load: true
          push: false
          tags: manga-manager:arm64-ci
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64
      - name: Run ARM64 migration and doctor under QEMU
        run: |
          docker run -d --name arm64-postgres --network host \
            -e POSTGRES_DB=manga_manager -e POSTGRES_USER=manga -e POSTGRES_PASSWORD=manga \
            postgres:16-alpine
          for attempt in $(seq 1 30); do
            docker exec arm64-postgres pg_isready -U manga -d manga_manager && break
            sleep 1
          done
          docker run --rm --platform linux/arm64 --network host \
            -e V2_DATABASE_URL=postgresql+psycopg://manga:manga@127.0.0.1:5432/manga_manager \
            manga-manager:arm64-ci manga-manager migrate
          docker run --rm --platform linux/arm64 --network host \
            -e V2_DATABASE_URL=postgresql+psycopg://manga:manga@127.0.0.1:5432/manga_manager \
            manga-manager:arm64-ci manga-manager doctor

  browser:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: manga_manager
          POSTGRES_USER: manga
          POSTGRES_PASSWORD: manga
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U manga -d manga_manager"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      V2_DATABASE_URL: postgresql+psycopg://manga:manga@127.0.0.1:5432/manga_manager
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:8000
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: uv sync --frozen --extra dev
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: uv run manga-manager migrate
      - name: Start web server
        run: |
          .venv/bin/uvicorn manga_manager.web.app:app --host 127.0.0.1 --port 8000 \
            > /tmp/manga-web.log 2>&1 &
          echo $! > /tmp/manga-web.pid
      - run: |
          for attempt in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8000/healthz && break
            sleep 1
          done
          curl -fsS http://127.0.0.1:8000/healthz
      - run: npx playwright install --with-deps firefox
        working-directory: frontend
      - run: npm run test:browser
        working-directory: frontend
      - name: Stop web server
        if: always()
        run: |
          if [ -f /tmp/manga-web.pid ]; then
            kill "$(cat /tmp/manga-web.pid)" 2>/dev/null || true
          fi
