name: Verify

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: manga_manager_test
          POSTGRES_USER: manga
          POSTGRES_PASSWORD: manga
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U manga -d manga_manager_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      V2_TEST_DATABASE_URL: postgresql+psycopg://manga:manga@127.0.0.1:5432/manga_manager_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check .
      - run: uv run pytest -q

  arm64-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: false
          tags: manga-manager:arm64-ci
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64
