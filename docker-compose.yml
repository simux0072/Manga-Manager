x-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: manga_manager
      POSTGRES_USER: manga
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-manga}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manga -d manga_manager"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 384m
    restart: unless-stopped
    logging: *default-logging
    networks: [internal]

  migrate:
    build: .
    environment:
      V2_DATABASE_URL: postgresql+psycopg://manga:${POSTGRES_PASSWORD:-manga}@postgres:5432/manga_manager
    command: ["manga-manager", "migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    mem_limit: 256m
    networks: [internal]

  web:
    build: .
    env_file: .env
    environment:
      V2_DATABASE_URL: postgresql+psycopg://manga:${POSTGRES_PASSWORD:-manga}@postgres:5432/manga_manager
      V2_STORAGE_ROOT: /data
      V2_MIN_FREE_BYTES: ${V2_MIN_FREE_BYTES:-5368709120}
    command: ["uvicorn", "manga_manager.web.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports: ["${MANGA_MANAGER_BIND_ADDRESS:-0.0.0.0}:${MANGA_MANAGER_PORT:-8000}:8000"]
    volumes: ["${MANGA_STORAGE_ROOT:-./storage-v2}:/data"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import json,urllib.request; assert json.load(urllib.request.urlopen('http://127.0.0.1:8000/healthz',timeout=3))['ok']"]
      interval: 15s
      timeout: 5s
      retries: 5
    mem_limit: 384m
    restart: unless-stopped
    logging: *default-logging
    networks: [internal]
    labels:
      traefik.enable: ${TRAEFIK_ENABLE:-false}
      traefik.http.routers.manga-manager.rule: ${TRAEFIK_RULE:-Host(`manga.local`)}

  worker:
    build: .
    env_file: .env
    environment:
      V2_DATABASE_URL: postgresql+psycopg://manga:${POSTGRES_PASSWORD:-manga}@postgres:5432/manga_manager
      V2_WORKER_ID: manga-manager
      V2_STORAGE_ROOT: /data
      V2_MIN_FREE_BYTES: ${V2_MIN_FREE_BYTES:-5368709120}
    command: ["manga-manager", "worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes: ["${MANGA_STORAGE_ROOT:-./storage-v2}:/data"]
    restart: unless-stopped
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "manga-manager", "doctor"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks: [internal]
    logging: *default-logging

  maintenance:
    build: .
    profiles: ["maintenance"]
    environment:
      V2_DATABASE_URL: postgresql+psycopg://manga:${POSTGRES_PASSWORD:-manga}@postgres:5432/manga_manager
      V2_STORAGE_ROOT: /data
    command: ["manga-manager", "reconcile-storage"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes: ["${MANGA_STORAGE_ROOT:-./storage-v2}:/data"]
    mem_limit: 256m
    restart: "no"
    networks: [internal]

volumes:
  postgres-data:

networks:
  internal:
