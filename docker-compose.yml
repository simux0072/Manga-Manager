services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: manga_manager
      POSTGRES_USER: manga
      POSTGRES_PASSWORD: manga
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manga -d manga_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

  manga-manager:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://manga:manga@postgres:5432/manga_manager}
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
