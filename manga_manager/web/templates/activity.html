{% extends "base.html" %}{% block title %}Activity · Manga Manager{% endblock %}{% block content %}<h1>Activity</h1><form method="get"><input name="event_type" value="{{ event_type }}" placeholder="Filter event type"><button>Filter</button></form><ol class="timeline">{% for event in events %}<li><time>{{ event.created_at }}</time><strong>{{ event.event_type }}</strong> Job {{ event.job_id }} · {{ event.status }} {{ event.message }}</li>{% endfor %}</ol>{% endblock %}
