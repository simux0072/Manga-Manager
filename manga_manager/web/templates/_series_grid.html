{% for item in series %}<article class="media-card"><div class="cover-shell">{% if item.cover_url %}<img src="{{ item.cover_url }}" alt="" loading="lazy">{% endif %}</div><h2>{{ item.title }}</h2><span class="state-chip">{{ item.status }}</span><form method="post" action="/series/{{ item.id }}/state"><input type="hidden" name="state" value="interested"><button>Track</button></form></article>{% endfor %}
{% if next_cursor %}<a class="load-more" href="/discovery?cursor={{ next_cursor }}&q={{ q|urlencode }}&source={{ source|urlencode }}" hx-get="/discovery?cursor={{ next_cursor }}&q={{ q|urlencode }}&source={{ source|urlencode }}" hx-target="#series-grid" hx-swap="beforeend">Load more</a>{% endif %}
