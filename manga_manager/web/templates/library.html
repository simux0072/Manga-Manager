{% extends "base.html" %}{% block title %}Library · Manga Manager{% endblock %}{% block content %}<h1>Library</h1><form method="get" class="filters" id="library-filters"><input name="q" value="{{ q }}" placeholder="Search library"><select name="source"><option value="">All sources</option>{% for value in ['asura','mangafire','kingofshojo'] %}<option value="{{ value }}" {% if source == value %}selected{% endif %}>{{ value }}</option>{% endfor %}</select><select name="state"><option value="">All states</option>{% for value in ['interested','reading','caught_up','paused'] %}<option value="{{ value }}" {% if state == value %}selected{% endif %}>{{ value }}</option>{% endfor %}</select><button name="view" value="grid">Grid</button><button name="view" value="list">Compact list</button><button type="button" data-save-filter="library">Save filter</button></form><section id="library-grid" class="{% if view == 'list' %}media-list{% else %}cover-grid{% endif %}">{% include "_library_grid.html" %}</section>{% endblock %}
