{% extends "base.html" %}{% block title %}Library · Manga Manager{% endblock %}{% block content %}<h1>Library</h1><section class="cover-grid">{% for item in series %}<article class="media-card"><h2>{{ item.title }}</h2><span class="state-chip">{{ item.status }}</span><form method="post" action="/series/{{ item.id }}/state"><select name="state">{% for state in ['interested','reading','caught_up','paused','untracked'] %}<option {% if item.status == state %}selected{% endif %}>{{ state }}</option>{% endfor %}</select><button>Save</button></form></article>{% endfor %}</section>{% endblock %}
