<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}Manga Manager{% endblock %}</title><link rel="stylesheet" href="/static/styles.css"><script defer src="/static/htmx.min.js"></script></head>
